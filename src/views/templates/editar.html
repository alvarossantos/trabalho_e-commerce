{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0 border-0 mt-3 text-center">
                <h3>Editar Produto #{{ produto.id }}</h3>
                <p class="text-muted">Atualize as informações do produto abaixo.</p>
            </div>
            
            <div class="card-body">
                <form action="/editar/{{ produto.id }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" class="form-control" id="nome" name="nome" required value="{{ produto.nome }}">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3">{{ produto.descricao }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="preco" class="form-label fw-bold">Preço Unitário (R$)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" id="preco" name="preco" required value="{{ produto.preco }}">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Salvar Alterações</button>
                        <a href="/" class="btn btn-link text-muted text-decoration-none">Cancelar e Voltar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
