{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0 border-0 mt-3 text-center">
                <h3>Cadastrar Novo Produto</h3>
                <p class="text-muted">Preencha os dados abaixo para adicionar ao estoque.</p>
            </div>
            
            <div class="card-body">
                <form action="/cadastrar" method="POST">
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" class="form-control" id="nome" name="nome" required placeholder="Ex: Notebook Dell Inspiron">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Detalhes do produto..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="preco" class="form-label fw-bold">Preço Unitário (R$)</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="preco" name="preco" required placeholder="0.00">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="quantidade" class="form-label fw-bold">Quantidade Inicial (Estoque)</label>
                            <input type="number" min="0" class="form-control" id="quantidade" name="quantidade" required placeholder="Ex: 10">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Salvar Produto e Estoque</button>
                        <a href="/" class="btn btn-link text-muted text-decoration-none">Cancelar e Voltar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
